<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爷爷的小天地</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👴</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.7.7/lunar.js"></script>
<script src="https://www.youtube.com/iframe_api" async></script>
<style>
  :root {
    --fs: 1;
    --bg: #FDF7EC;
    --bg-2: #F6ECD6;
    --card: #FFFFFF;
    --ink: #2B1810;
    --ink-soft: #6B5B4F;
    --ink-mute: #988572;
    --red: #C8102E;
    --red-dark: #9A0C23;
    --gold: #B8860B;
    --gold-soft: #E8C878;
    --jade: #2F6E5A;
    --blue: #1F4E79;
    --border: #E8DCC4;
  }
  * { box-sizing: border-box; }
  html {
    font-size: calc(16px * var(--fs));
    background:
      radial-gradient(ellipse at top left, #FFF6E0 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, #F5E8C9 0%, transparent 50%),
      var(--bg);
    background-attachment: fixed;
  }
  body {
    margin: 0; padding: 0;
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--ink);
    font-size: 1.375rem;
    line-height: 1.6;
    min-height: 100vh;
  }
  .title-font { font-family: 'Noto Serif SC', serif; }
  .brush-font { font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif; }

  /* TOP BAR */
  .topbar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 2rem;
    padding: 1.25rem 2.5rem;
    border-bottom: 3px solid var(--border);
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .greeting {
    font-family: 'Noto Serif SC', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--red);
    letter-spacing: 2px;
    cursor: pointer;
  }
  .center-strip {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    justify-self: center;
  }
  .clocks {
    display: grid;
    grid-template-columns: auto auto;
    column-gap: 0.7rem;
    row-gap: 2px;
    align-items: baseline;
  }
  .clock-city {
    font-size: 1rem;
    font-weight: 600;
    color: var(--ink-soft);
  }
  .clock {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.7rem;
    font-weight: 900;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    letter-spacing: 1.5px;
    line-height: 1.1;
  }
  .clock.secondary { color: var(--ink-soft); font-size: 1.4rem; }
  .weather {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--ink-soft);
    white-space: nowrap;
    cursor: pointer;
  }
  .weather:hover { color: var(--red); }
  .right-strip {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    justify-self: end;
  }
  .date-stack { text-align: right; }
  .date {
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .lunar {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.05rem;
    color: var(--gold);
    font-weight: 700;
    margin-top: 2px;
    white-space: nowrap;
  }
  .font-controls { display: flex; gap: 6px; }
  .fc-btn {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    color: var(--ink);
    min-width: 48px;
    white-space: nowrap;
  }
  .fc-btn:hover { border-color: var(--gold); background: var(--bg-2); }

  /* PAGES */
  .page { display: none; padding: 2.5rem 3rem 5rem; animation: fadeIn .25s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* HOME */
  .home-wrap { max-width: 1500px; margin: 0 auto; }
  .home-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5rem;
  }
  .tile {
    background: var(--card);
    border: 3px solid var(--border);
    border-radius: 28px;
    padding: 3rem 2rem 2.5rem;
    min-height: 22rem;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .tile::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--tile-gradient, transparent);
    opacity: 0.08;
    pointer-events: none;
  }
  .tile.news { --tile-gradient: linear-gradient(135deg, #1F4E79, #73A8D3); }
  .tile.tv { --tile-gradient: linear-gradient(135deg, #C8102E, #F5A0A8); }
  .tile.videocall { --tile-gradient: linear-gradient(135deg, #6B4E8C, #B098D1); }
  .tile.weather { --tile-gradient: linear-gradient(135deg, #E8A547, #F5D28A); }
  .tile.weather .label { color: #C87116; }
  a.tile { text-decoration: none; color: inherit; }
  .tile:hover {
    transform: translateY(-8px);
    box-shadow: 0 24px 48px rgba(0,0,0,0.12);
    border-color: var(--gold);
  }
  .tile:active { transform: translateY(-2px); }
  .tile:focus-visible { outline: 4px solid var(--gold); outline-offset: 4px; }
  .tile-key {
    position: absolute;
    top: 1.2rem; left: 1.2rem;
    background: var(--bg-2);
    color: var(--ink-mute);
    width: 2.2rem; height: 2.2rem;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 1.1rem;
  }
  .tile .emoji { font-size: 5.5rem; line-height: 1; margin-bottom: 1rem; }
  .tile .label {
    font-family: 'Noto Serif SC', serif;
    font-size: 3.5rem;
    font-weight: 900;
    margin-bottom: 0.3rem;
  }
  .tile .sub { font-size: 1.3rem; color: var(--ink-soft); }
  .tile.news .label { color: var(--blue); }
  .tile.tv .label { color: var(--red); }
  .tile.videocall .label { color: #6B4E8C; }

  /* POEM CARD */
  .poem-card {
    margin-top: 2.5rem;
    background: linear-gradient(135deg, #FFF9EB 0%, #FAEBC8 100%);
    border: 3px solid var(--gold-soft);
    border-radius: 28px;
    padding: 2rem 2.5rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .poem-card::after {
    content: '詩';
    font-family: 'Ma Shan Zheng', serif;
    position: absolute;
    right: 2rem; top: -1rem;
    font-size: 12rem;
    color: rgba(184, 134, 11, 0.08);
    pointer-events: none;
  }
  .poem-label {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 2.4rem;
    color: var(--red);
    writing-mode: vertical-rl;
    text-orientation: upright;
    line-height: 1.1;
  }
  .poem-body {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.8;
  }
  .poem-origin {
    font-size: 1.1rem;
    color: var(--gold);
    margin-top: 0.4rem;
    font-weight: 600;
  }
  .poem-speak {
    background: var(--gold);
    color: #fff;
    border: 0;
    border-radius: 14px;
    padding: 14px 22px;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 0 4px 0 #8A6608;
  }
  .poem-speak:active { transform: translateY(2px); box-shadow: 0 2px 0 #8A6608; }

  /* SUB PAGE HEADER */
  .sub-header {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 2rem;
    max-width: 1500px;
    margin-left: auto;
    margin-right: auto;
    flex-wrap: wrap;
  }
  .back-btn {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 0.9rem 1.8rem;
    font-size: 1.5rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    box-shadow: 0 4px 0 var(--red-dark);
    text-decoration: none;
  }
  .back-btn:hover { background: var(--red-dark); }
  .back-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--red-dark); }
  .page-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 2.6rem;
    font-weight: 900;
    margin: 0;
  }
  .header-spacer { flex: 1; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0.6rem;
    max-width: 1500px;
    margin: 0 auto 2rem;
    flex-wrap: wrap;
  }
  .tab {
    background: #fff;
    border: 3px solid var(--border);
    border-radius: 14px;
    padding: 0.7rem 1.4rem;
    font-size: 1.3rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.15s;
  }
  .tab:hover { border-color: var(--gold); }
  .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .tab.tv-tab.active { background: var(--red); border-color: var(--red); }

  /* QUICK NEWS SITE LINKS */
  .news-sites { margin-bottom: 1.5rem; }
  .ns-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
  }
  .ns-link {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--card);
    border: 3px solid var(--border);
    border-radius: 18px;
    padding: 1rem 1.25rem;
    text-decoration: none;
    color: var(--ink);
    transition: all 0.15s;
  }
  .ns-link:hover {
    border-color: var(--blue);
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.08);
  }
  .ns-logo {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    flex-shrink: 0;
    object-fit: contain;
    background: #fff;
  }
  .ns-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.5rem;
    font-weight: 700;
  }

  /* SEARCH BOX */
  .searchbox {
    display: flex;
    gap: 0.5rem;
    max-width: 600px;
    margin-left: auto;
  }
  .searchbox input {
    flex: 1;
    border: 3px solid var(--border);
    border-radius: 14px;
    padding: 0.7rem 1rem;
    font-size: 1.3rem;
    font-family: inherit;
    background: #fff;
  }
  .searchbox input:focus { outline: none; border-color: var(--red); }
  .searchbox button {
    background: var(--red);
    color: #fff;
    border: 0;
    border-radius: 14px;
    padding: 0.7rem 1.4rem;
    font-size: 1.3rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }

  /* NEWS CARDS */
  .news-list {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
    max-width: 1500px;
    margin: 0 auto;
  }
  .news-card {
    display: grid;
    grid-template-columns: 17rem 1fr;
    gap: 1.5rem;
    background: var(--card);
    border: 3px solid var(--border);
    border-radius: 20px;
    padding: 1.25rem;
    transition: all 0.15s;
    align-items: start;
  }
  .news-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 32px rgba(0,0,0,0.08);
    border-color: var(--gold);
  }
  .news-thumb {
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 14px;
    overflow: hidden;
    background: linear-gradient(135deg, #FFE4B5, #FFD1A3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.8rem;
  }
  .news-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .news-body { min-width: 0; }
  .news-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.7rem;
    font-weight: 700;
    margin: 0 0 0.6rem;
    color: var(--ink);
    line-height: 1.4;
  }
  .news-title a { color: inherit; text-decoration: none; }
  .news-title a:hover { color: var(--red); }
  .news-snippet {
    font-size: 1.2rem;
    color: var(--ink-soft);
    margin: 0 0 0.75rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .news-meta {
    font-size: 1.1rem;
    color: var(--ink-soft);
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 0.8rem;
  }
  .news-source {
    background: var(--blue);
    color: #fff;
    padding: 3px 10px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 1rem;
  }
  .news-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .news-btn {
    background: var(--bg-2);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 0.5rem 1rem;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    color: var(--ink);
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    text-decoration: none;
  }
  .news-btn:hover { border-color: var(--gold); background: #FFF9EB; }
  .news-btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .news-btn.primary:hover { background: #163956; }
  .news-btn.speaking { background: var(--gold); color: #fff; border-color: var(--gold); animation: pulse 1.2s infinite; }
  @keyframes pulse { 50% { opacity: 0.7; } }

  /* LOADING SKELETON */
  .loading, .empty-msg {
    text-align: center;
    padding: 4rem 1.5rem;
    font-size: 1.6rem;
    color: var(--ink-soft);
    max-width: 1500px;
    margin: 0 auto;
  }
  .skeleton-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
    max-width: 1500px;
    margin: 0 auto;
  }
  .skeleton-card {
    display: grid;
    grid-template-columns: 17rem 1fr;
    gap: 1.5rem;
    background: var(--card);
    border: 3px solid var(--border);
    border-radius: 20px;
    padding: 1.25rem;
  }
  .skel {
    background: linear-gradient(90deg, #F0E6CF 25%, #F9F1DA 37%, #F0E6CF 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 10px;
  }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
  .skel-thumb { aspect-ratio: 4/3; border-radius: 14px; }
  .skel-line { height: 1rem; margin-bottom: 0.6rem; }
  .skel-line.title { height: 1.6rem; width: 80%; }
  .skel-line.short { width: 40%; }

  /* TV / GAMES CARDS */
  .tv-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    max-width: 1500px;
    margin: 0 auto;
  }
  .tv-card {
    background: var(--card);
    border: 3px solid var(--border);
    border-radius: 20px;
    padding: 2.2rem 1.75rem;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    transition: all 0.15s;
    min-height: 15rem;
    justify-content: center;
  }
  .tv-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 32px rgba(0,0,0,0.1);
    border-color: var(--red);
  }
  .tv-card .s-emoji { font-size: 5.2rem; margin-bottom: 0.8rem; line-height: 1; }
  .tv-card .s-label {
    font-family: 'Noto Serif SC', serif;
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .tv-card .s-sub { font-size: 1.25rem; color: var(--ink-soft); }

  /* SECTIONS on TV */
  .section { max-width: 1500px; margin: 0 auto 2rem; }
  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--ink);
    margin: 0 0 1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .video-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(16rem, 1fr));
    gap: 1rem;
  }
  .video-thumb {
    cursor: pointer;
    background: var(--card);
    border: 3px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.15s, border-color 0.15s;
  }
  .video-thumb:hover { transform: translateY(-3px); border-color: var(--red); }
  .video-thumb img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #ddd; }
  .video-thumb .v-title {
    padding: 0.7rem 0.8rem 0.8rem;
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* WEATHER PAGE */
  .weather-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    max-width: 1500px;
    margin: 0 auto;
  }
  .weather-city {
    background: var(--card);
    border: 3px solid var(--border);
    border-radius: 20px;
    padding: 1.75rem 2rem;
  }
  .wx-header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 2px dashed var(--border);
  }
  .wx-current-emoji { font-size: 4.5rem; line-height: 1; }
  .wx-city-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--red);
  }
  .wx-current-desc { font-size: 1.3rem; color: var(--ink-soft); margin-top: 0.2rem; }
  .wx-current-temp {
    font-family: 'Noto Serif SC', serif;
    font-size: 4rem;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .wx-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem 1.5rem;
    margin: 0 0 1.25rem;
    padding: 1rem 1.25rem;
    background: var(--bg-2);
    border-radius: 12px;
  }
  .wx-stat {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 1.05rem;
  }
  .wx-stat-label { color: var(--ink-soft); }
  .wx-stat-value { font-weight: 700; color: var(--ink); }
  .wx-section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.35rem;
    font-weight: 700;
    margin: 1.25rem 0 0.6rem;
    color: var(--ink);
    display: flex; align-items: center; gap: 0.5rem;
  }
  .wx-hourly {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0.5rem;
  }
  .wx-hourly-item {
    background: var(--bg-2);
    border-radius: 12px;
    padding: 0.8rem 0.4rem;
    text-align: center;
  }
  .wx-hourly-time { font-size: 0.9rem; color: var(--ink-soft); font-weight: 600; }
  .wx-hourly-emoji { font-size: 1.5rem; margin: 0.3rem 0; line-height: 1; }
  .wx-hourly-temp { font-weight: 700; font-size: 1.05rem; }
  .wx-hourly-pop { font-size: 0.8rem; color: #1F4E79; font-weight: 600; }
  .wx-daily { display: grid; gap: 0.4rem; }
  .wx-daily-item {
    display: grid;
    grid-template-columns: 5rem 2.5rem 1fr 4rem 4rem;
    align-items: center;
    padding: 0.6rem 0.9rem;
    background: var(--bg-2);
    border-radius: 10px;
    font-size: 1.05rem;
    gap: 0.5rem;
  }
  .wx-daily-item.today { background: #FFF3D6; border: 2px solid var(--gold-soft); }
  .wx-daily-day { font-weight: 700; color: var(--ink); }
  .wx-daily-date { font-size: 0.85rem; color: var(--ink-soft); font-weight: 500; display: block; }
  .wx-daily-emoji { font-size: 1.5rem; text-align: center; line-height: 1; }
  .wx-daily-desc { color: var(--ink-soft); font-size: 1rem; }
  .wx-daily-min { text-align: right; color: var(--ink-soft); font-size: 1rem; font-variant-numeric: tabular-nums; }
